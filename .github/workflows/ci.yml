name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting (CSharpier)
        run: dotnet csharpier check .

      - name: Restore NuGet packages
        run: dotnet restore McpManager.sln

      - name: Build with warnings as errors
        run: dotnet build McpManager.sln -c Release --no-restore -warnaserror

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: McpManager.Web.Portal/package-lock.json

      - name: Install frontend deps
        working-directory: McpManager.Web.Portal
        run: npm ci

      - name: Build frontend
        working-directory: McpManager.Web.Portal
        run: npm run build

      - name: Restore NuGet packages
        run: dotnet restore McpManager.sln

      - name: Build solution
        run: dotnet build McpManager.sln -c Release --no-restore

      - name: Publish Portal
        run: dotnet publish McpManager.Web.Portal/McpManager.Web.Portal.csproj -c Release --no-build -o publish
