name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  # Lets codecov-action mint a short-lived OIDC token instead of using a
  # static CODECOV_TOKEN secret — public-repo friendly, no secret rotation.
  id-token: write

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting (CSharpier)
        run: dotnet csharpier check .

      - name: Restore NuGet packages
        run: dotnet restore McpManager.sln

      - name: Build with warnings as errors
        run: dotnet build McpManager.sln -c Release --no-restore -warnaserror

  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/McpManager.Web.Portal/package-lock.json

      - name: Install frontend deps
        working-directory: src/McpManager.Web.Portal
        run: npm ci

      - name: Build frontend
        working-directory: src/McpManager.Web.Portal
        run: npm run build

      - name: Restore NuGet packages
        run: dotnet restore McpManager.sln

      - name: Build solution
        run: dotnet build McpManager.sln -c Release --no-restore

      # MTP-native flags after `--`: xUnit v3 runs under Microsoft.Testing.Platform,
      # which doesn't honour VSTest-style --collect/--logger/--settings. Coverage and
      # TRX come from Microsoft.Testing.Extensions.CodeCoverage / .TrxReport packages
      # referenced by each test project. Each project produces one cobertura.xml + one
      # TRX under ./coverage/, which is exactly what Codecov / dorny/test-reporter want.
      - name: Test
        run: dotnet test --solution McpManager.sln --no-build -c Release -- --coverage --coverage-output-format cobertura --report-trx --results-directory $GITHUB_WORKSPACE/coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: coverage/**/*.cobertura.xml
          flags: unit-integration
          fail_ci_if_error: false

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results
          path: coverage/**/*.trx
          reporter: dotnet-trx

      - name: Publish Portal
        run: dotnet publish src/McpManager.Web.Portal/McpManager.Web.Portal.csproj -c Release --no-build -o publish
