# Disable Codecov's automated pull-request comments. Status checks and the
# dashboard still work; only the per-PR comment is suppressed.
comment: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 60%

# Exclude code that is not a unit/integration test target so the reported
# percentage reflects testable application logic, not generated/bootstrap
# scaffolding. Same rationale as the original EF migrations exclusion.
#   - Migrations:        auto-generated by EF tooling.
#   - Razor .cshtml:     view templates (markup), not testable logic — the
#                        integration/e2e tiers assert rendered behaviour.
#   - Program.cs:        composition root / host bootstrap.
#   - *DbContextFactory: EF design-time only; never runs in the live app.
ignore:
  - "src/McpManager.Core.Data/Migrations/**"
  - "**/*.cshtml"
  - "src/McpManager.Web.Portal/Program.cs"
  - "src/McpManager.Core.Data/DesignTimeApplicationDbContextFactory.cs"

# Flag carryforward keeps the merged "All flags" view stable when one upload
# is missing or delayed. ci.yml uploads `unit-integration` (UnitTests +
# IntegrationTests). Without carryforward, a transient upload failure would
# silently report 0% across every file on the dashboard.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: unit-integration
      carryforward: true
