<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="url(#bg)"/>

  <!-- AI Clients Column -->
  <text x="100" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#a3a3a3" letter-spacing="1.5">AI CLIENTS</text>
  <g filter="url(#shadow)">
    <rect x="20" y="52" width="160" height="44" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="100" y="79" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">Claude Code</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="108" width="160" height="44" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="100" y="135" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">Cursor</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="164" width="160" height="44" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="100" y="191" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">Windsurf</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="220" width="160" height="44" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="100" y="247" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">Codex</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="276" width="160" height="44" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="100" y="303" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">Opencode</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="20" y="332" width="160" height="44" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="100" y="359" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">Any MCP Client</text>
  </g>

  <!-- Arrows: Clients → MCP Manager -->
  <g stroke="#d4d4d4" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)">
    <line x1="180" y1="74" x2="320" y2="200"/>
    <line x1="180" y1="130" x2="320" y2="200"/>
    <line x1="180" y1="186" x2="320" y2="200"/>
    <line x1="180" y1="242" x2="320" y2="210"/>
    <line x1="180" y1="298" x2="320" y2="220"/>
    <line x1="180" y1="354" x2="320" y2="230"/>
  </g>

  <!-- MCP Manager (center) -->
  <text x="450" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#a3a3a3" letter-spacing="1.5">MCP MANAGER</text>
  <g filter="url(#shadow)">
    <rect x="320" y="52" width="260" height="326" rx="14" fill="#fff" stroke="#f97316" stroke-width="2"/>
    <rect x="320" y="52" width="260" height="50" rx="14" fill="url(#accent)"/>
    <rect x="320" y="82" width="260" height="20" fill="url(#accent)"/>
    <text x="450" y="84" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">MCP Manager</text>
    <text x="450" y="134" text-anchor="middle" font-size="11" fill="#737373">Unified Endpoint</text>
    <text x="450" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#f97316">/mcp</text>
    <line x1="340" y1="170" x2="560" y2="170" stroke="#f5f5f5" stroke-width="1"/>
    <text x="450" y="196" text-anchor="middle" font-size="11" fill="#737373">Namespace Routing</text>
    <text x="450" y="222" text-anchor="middle" font-size="11" fill="#737373">API Key Auth</text>
    <text x="450" y="248" text-anchor="middle" font-size="11" fill="#737373">Rate Limiting</text>
    <text x="450" y="274" text-anchor="middle" font-size="11" fill="#737373">Request Logging</text>
    <text x="450" y="300" text-anchor="middle" font-size="11" fill="#737373">Tool Aggregation</text>
    <text x="450" y="326" text-anchor="middle" font-size="11" fill="#737373">Health Monitoring</text>
    <text x="450" y="352" text-anchor="middle" font-size="11" fill="#737373">Live Log Streaming</text>
  </g>

  <!-- Arrows: MCP Manager → Upstream -->
  <g stroke="#d4d4d4" stroke-width="1.5" fill="none">
    <line x1="580" y1="140" x2="660" y2="110"/>
    <line x1="580" y1="200" x2="660" y2="200"/>
    <line x1="580" y1="260" x2="660" y2="300"/>
  </g>

  <!-- Upstream Sources Column -->
  <text x="770" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#a3a3a3" letter-spacing="1.5">UPSTREAM SOURCES</text>

  <g filter="url(#shadow)">
    <rect x="660" y="52" width="220" height="100" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="770" y="80" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">MCP Servers</text>
    <text x="770" y="100" text-anchor="middle" font-size="11" fill="#a3a3a3">HTTP / SSE</text>
    <text x="770" y="118" text-anchor="middle" font-size="11" fill="#a3a3a3">Stdio (CLI)</text>
    <text x="770" y="136" text-anchor="middle" font-size="11" fill="#a3a3a3">Bearer · API Key · Basic</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="168" width="220" height="72" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="770" y="198" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">OpenAPI Specs</text>
    <text x="770" y="218" text-anchor="middle" font-size="11" fill="#a3a3a3">Auto-converted to MCP tools</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="256" width="220" height="72" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <text x="770" y="286" text-anchor="middle" font-size="13" font-weight="500" fill="#262626">Custom Web Endpoints</text>
    <text x="770" y="306" text-anchor="middle" font-size="11" fill="#a3a3a3">REST APIs as MCP tools</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4d4d4"/>
    </marker>
  </defs>
</svg>